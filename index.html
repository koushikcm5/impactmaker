    <!-- Performance: DNS Prefetch & Preconnect -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://read.amazon.in" />
    
    <!-- Optimized Font Loading -->

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" media="print" onload="this.media='all'" />

    <!-- Inline Critical CSS for faster FCP -->
    <style>
      :root {
        --primary-blue: #1659a7;
        --accent-orange: #f28c28;
        --dark-text: #0a0e27;
        --light-bg: #ffffff;
      }
      html { scroll-behavior: smooth; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif; margin: 0; padding: 0; background: #ffffff; color: var(--dark-text); }
      .app { min-height: 100vh; position: relative; overflow: clip; isolation: isolate; }
      #root { width: 100%; }
      .hero { position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
      .hero-bg-slider { position: absolute; inset: 0; z-index: 0; }
      .hero-bg-slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; z-index: 1; will-change: opacity; }
      .hero-bg-slide.active { opacity: 1; transition: opacity 0.8s ease-in-out; }
      .hero-bg-overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.4); z-index: 2; }
      .hero-content { position: relative; z-index: 3; max-width: 1200px; margin: 0 auto; padding: 2rem; display: flex; align-items: center; justify-content: space-between; gap: 3rem; }
      .hero-text { flex: 1; color: white; z-index: 10; }
      .hero-heading { font-size: clamp(2rem, 5vw, 4rem); font-weight: 700; margin: 0; line-height: 1.2; }
      .hero-subtitle-text { font-size: clamp(1rem, 2vw, 1.5rem); margin: 0.5rem 0 0 0; opacity: 0.9; }
      .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
      .relative-z10 { position: relative; z-index: 10; }
    </style>
